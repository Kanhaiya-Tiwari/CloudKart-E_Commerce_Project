# Project: CloudKart
# File: 01-namespace.yaml
# Description: Kubernetes manifest file.
# How to use: Applied to the cluster via 'kubectl apply' or ArgoCD.
# Why it exists: To define desired state of K8s resources.
# When it's used: During application deployment to EKS.

apiVersion: v1
kind: Namespace
metadata:
  name: cloudkart
  labels:
    name: cloudkart
    environment: production