# Project: CloudKart
# File: cloudkart-app.yaml
# Description: Kubernetes manifest file.
# How to use: Applied to the cluster via 'kubectl apply' or ArgoCD.
# Why it exists: To define desired state of K8s resources.
# When it's used: During application deployment to EKS.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudkart-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Kanhaiya-Tiwari/CloudKart-E_Commerce_Project
    targetRevision: master
    path: kubernetes/cloudkart
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudkart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /status/terminatingReplicas
